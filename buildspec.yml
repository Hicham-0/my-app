version: 0.2

phases:
  install:
    commands:
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  pre_build:
    commands:
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - export IMAGE_URI=$ECR_URI/$ECR_REPO:$IMAGE_TAG
      - export APP_VERSION=$(node -p "require('./app/package.json').version")
      - export FAMILY=$PROJECT-$ENVIRONMENT
      - echo "Building $IMAGE_URI — APP_VERSION=$APP_VERSION — FAMILY=$FAMILY"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
      - cd app && npm ci && npm test && cd ..

  build:
    commands:
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - export IMAGE_URI=$ECR_URI/$ECR_REPO:$IMAGE_TAG
      - docker build -t $IMAGE_URI .
      - docker tag $IMAGE_URI $ECR_URI/$ECR_REPO:latest
      - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --no-progress $IMAGE_URI

  post_build:
    commands:
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - export IMAGE_URI=$ECR_URI/$ECR_REPO:$IMAGE_TAG
      - export APP_VERSION=$(node -p "require('./app/package.json').version")
      - export FAMILY=$PROJECT-$ENVIRONMENT
      - export EXEC_ROLE_ARN="arn:aws:iam::$AWS_ACCOUNT_ID:role/$FAMILY-ecs-execution-role"
      - export TASK_ROLE_ARN="arn:aws:iam::$AWS_ACCOUNT_ID:role/$FAMILY-ecs-task-role"
      - export LOG_GROUP="/ecs/$FAMILY"

      # Détermine quelle couleur est active sur le listener port 80
      - export CURRENT_TG=$(aws elbv2 describe-listeners --region $AWS_DEFAULT_REGION --listener-arns $LISTENER_ARN --query "Listeners[0].DefaultActions[0].TargetGroupArn" --output text)
      - echo "Current TG = $CURRENT_TG"
      - |
        if echo "$CURRENT_TG" | grep -q "blue"; then
          export DEPLOY_COLOR="green"
        else
          export DEPLOY_COLOR="blue"
        fi
      - echo "Next DEPLOY_COLOR = $DEPLOY_COLOR"

      - docker push $IMAGE_URI
      - docker push $ECR_URI/$ECR_REPO:latest

      # Injecte toutes les valeurs dans taskdef.json via jq
      - |
        jq \
          --arg fam "$FAMILY" \
          --arg execRole "$EXEC_ROLE_ARN" \
          --arg taskRole "$TASK_ROLE_ARN" \
          --arg ver "$APP_VERSION" \
          --arg env "$ENVIRONMENT" \
          --arg reg "$AWS_DEFAULT_REGION" \
          --arg log "$LOG_GROUP" \
          --arg color "$DEPLOY_COLOR" \
          '.family = $fam |
           .executionRoleArn = $execRole |
           .taskRoleArn = $taskRole |
           .containerDefinitions[0].environment[0].value = $ver |
           .containerDefinitions[0].environment[1].value = $env |
           .containerDefinitions[0].environment[2].value = $reg |
           .containerDefinitions[0].environment[3].value = $color |
           .containerDefinitions[0].logConfiguration.options["awslogs-group"] = $log |
           .containerDefinitions[0].logConfiguration.options["awslogs-region"] = $reg' \
          taskdef.json > taskdef.tmp.json && mv taskdef.tmp.json taskdef.json

      - printf '{"ImageURI":"%s"}' $IMAGE_URI > imageDetail.json

artifacts:
  files:
    - imageDetail.json
    - appspec.yaml
    - taskdef.json